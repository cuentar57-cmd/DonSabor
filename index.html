<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotisería Don Sabor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{background:#f4f6f9;color:#333;padding-bottom:80px;}

header{
background:linear-gradient(135deg,#ff6b00,#ff3c00);
color:white;
padding:30px;
text-align:center;
}

.section{
padding:40px 20px;
max-width:1200px;
margin:auto;
}

.section h2{
margin-bottom:20px;
color:#ff3c00;
display:flex;
align-items:center;
gap:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{transform:translateY(-5px);}

.price{
font-weight:bold;
margin:10px 0;
color:#ff3c00;
}

button{
background:#ff3c00;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{background:#ff6b00;}

/* BOTÓN FLOTANTE */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#ff3c00;
color:white;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
cursor:pointer;
z-index:1000;
}

.cart-count{
position:absolute;
top:-5px;
right:-5px;
background:black;
color:white;
font-size:12px;
width:20px;
height:20px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* PANEL */
.cart-panel{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100vh;
background:white;
box-shadow:-5px 0 15px rgba(0,0,0,0.1);
padding:20px;
transition:0.4s;
z-index:999;
overflow-y:auto;
}

.cart-panel.active{right:0;}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
font-size:14px;
}

.qty{display:flex;gap:5px;align-items:center;}

.qty button{padding:2px 6px;font-size:12px;}

.total{
margin-top:20px;
font-weight:bold;
font-size:18px;
}

.whatsapp{
margin-top:15px;
background:#25d366;
width:100%;
}
</style>
</head>

<body>

<header>
<h1><i class="fa-solid fa-utensils"></i> Rotisería Don Sabor</h1>
<p>Comidas caseras todos los días</p>
</header>

<section class="section">
<h2><i class="fa-solid fa-burger"></i> Comidas</h2>
<div class="grid">

<div class="card">
<h3>Pollo Asado</h3>
<div class="price">$8000</div>
<button onclick="agregar('Pollo Asado',8000)">Agregar</button>
</div>

<div class="card">
<h3>Milanesa con Papas</h3>
<div class="price">$6500</div>
<button onclick="agregar('Milanesa con Papas',6500)">Agregar</button>
</div>

<div class="card">
<h3>Pizza Muzzarella</h3>
<div class="price">$7000</div>
<button onclick="agregar('Pizza Muzzarella',7000)">Agregar</button>
</div>

<div class="card">
<h3>Lomito Completo</h3>
<div class="price">$7500</div>
<button onclick="agregar('Lomito Completo',7500)">Agregar</button>
</div>

<div class="card">
<h3>Empanada</h3>
<div class="price">$1200</div>
<button onclick="agregar('Empanada',1200)">Agregar</button>
</div>

</div>
</section>

<section class="section">
<h2><i class="fa-solid fa-glass-water"></i> Bebidas</h2>
<div class="grid">

<div class="card">
<h3>Coca-Cola 2.25L</h3>
<div class="price">$2500</div>
<button onclick="agregar('Coca-Cola 2.25L',2500)">Agregar</button>
</div>

<div class="card">
<h3>Sprite 2.25L</h3>
<div class="price">$2500</div>
<button onclick="agregar('Sprite 2.25L',2500)">Agregar</button>
</div>

<div class="card">
<h3>Agua Mineral</h3>
<div class="price">$1500</div>
<button onclick="agregar('Agua Mineral',1500)">Agregar</button>
</div>

<div class="card">
<h3>Cerveza 1L</h3>
<div class="price">$3000</div>
<button onclick="agregar('Cerveza 1L',3000)">Agregar</button>
</div>

</div>
</section>

<div class="cart-btn" onclick="toggleCart()">
<i class="fa-solid fa-cart-shopping"></i>
<div class="cart-count" id="cart-count">0</div>
</div>

<div class="cart-panel" id="cart-panel">
<h2><i class="fa-solid fa-cart-shopping"></i> Tu Pedido</h2>
<div id="lista"></div>
<div class="total">Total: $<span id="total">0</span></div>
<button class="whatsapp" onclick="enviarWhatsApp()">
<i class="fa-brands fa-whatsapp"></i> Enviar Pedido
</button>
</div>

<script>
let carrito = {};

// 🔊 SONIDO FUNCIONANDO 100%
function sonidoAgregar(){
const audio = new Audio("function sonidoAgregar(){
const audio = new Audio("https://actions.google.com/sounds/v1/cash_register/cash_register.ogg");
audio.play();
}");
audio.play();
}

function agregar(nombre, precio){

sonidoAgregar();

if(carrito[nombre]){
carrito[nombre].cantidad++;
}else{
carrito[nombre] = {precio:precio, cantidad:1};
}

actualizarCarrito();
}

function actualizarCarrito(){
let lista = document.getElementById("lista");
lista.innerHTML="";
let total = 0;
let count = 0;

for(let item in carrito){
let datos = carrito[item];
total += datos.precio * datos.cantidad;
count += datos.cantidad;

lista.innerHTML += `
<div class="cart-item">
<span>${item}</span>
<div class="qty">
<button onclick="cambiarCantidad('${item}', -1)">-</button>
<span>${datos.cantidad}</span>
<button onclick="cambiarCantidad('${item}', 1)">+</button>
</div>
</div>
`;
}

document.getElementById("total").innerText = total;
document.getElementById("cart-count").innerText = count;
}

function cambiarCantidad(nombre, cambio){
carrito[nombre].cantidad += cambio;
if(carrito[nombre].cantidad <= 0){
delete carrito[nombre];
}
actualizarCarrito();
}

function toggleCart(){
document.getElementById("cart-panel").classList.toggle("active");
}

function enviarWhatsApp(){
let mensaje = "Hola, quiero pedir:%0A";
let total = 0;

for(let item in carrito){
let datos = carrito[item];
mensaje += `${item} x${datos.cantidad}%0A`;
total += datos.precio * datos.cantidad;
}

mensaje += `%0ATotal: $${total}`;

window.open(`https://wa.me/5493585079522?text=${mensaje}`);
}
</script>

</body>
</html>
